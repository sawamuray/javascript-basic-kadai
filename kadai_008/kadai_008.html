  <article>
    <h2>社会</h2>

    <section>
      <h3>和菓子店も「トリックオアトリート！」</h3>

      <p>
        日本でも年々人気の高まるハロウィン。<br>
        今年は大手和菓子店5社がハロウィン向けの和菓子セットを共同開発しました。
      </p>

      <audio controls src="ichi.mp3"></audio>

    </section>

    <section>

      <h3>私のおすすめ和菓子アンケートフォーム</h3>

      <form>

        <p>
          <label>氏名</label><br>
          <input type="text" placeholder="名前を入力してください">
        </p>

        <p>
          <label>年代</label><br>
          <select>
            <option>10代以下</option>
            <option>20代</option>
            <option>30代</option>
            <option>40代以上</option>
          </select>
        </p>

        <p>
          <label>性別</label><br>

          <input type="radio" name="gender">男性
          <input type="radio" name="gender">女性
          <input type="radio" name="gender">その他

        </p>

        <p>
          <label>おすすめ和菓子の名称</label><br>
          <input type="text" placeholder="例：みたらし団子">
        </p>

        <p>
          <label>おすすめする理由</label><br>
          <textarea></textarea>
        </p>

        <p>
          <input type="checkbox">
          個人情報保護方針に同意する
        </p>

        <p>
          <button type="submit">送信</button>
          <button type="reset">リセット</button>
        </p>

      </form>

    </section>

  </article>
